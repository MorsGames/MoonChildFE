<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Moon Child FE</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    #loader {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 16rem;
    }

    #start {
      border: 0;
      background: none;
      color: #FFFFFF;
      cursor: pointer;
      font-size: 1.5rem;
      font-family: sans-serif;
    }

    #start:disabled {
      cursor: default;
      color: #777777;
    }

    #progress-container {
      width: 100%;
      height: 1.25rem;
      margin-top: 1rem;
      background: #333333;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: #FFFFFF;
      transition: width 0.25s ease-out;
    }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>

  <div id="loader">
    <button id="start" disabled>Loading...</button>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const startBtn = document.getElementById('start');
    const progressBar = document.getElementById('progress-bar');

    startBtn.onclick = () => {
      document.getElementById('loader').remove();
      canvas.focus();
      Module.callMain(Module.arguments || []);
    };

    var Module = {
      canvas: canvas,
      noInitialRun: true,
      arguments: [],
      setStatus: (text) => {
        const match = text.match(/(\d+)\/(\d+)/);
        if (match) {
          const percent = Math.round((parseInt(match[1]) / parseInt(match[2])) * 100);
          progressBar.style.width = `${percent}%`;
          startBtn.textContent = `Loading... ${percent}%`;
        }
      },
      onRuntimeInitialized: () => {
        startBtn.disabled = false;
        startBtn.textContent = 'Click here to start!';
        document.getElementById('progress-container').style.display = 'none';
      }
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
